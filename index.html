<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#141414" />

    <title>LastFootball — Live Scores &amp; Results</title>
    <meta name="description" content="Real-time football live scores, fixtures, results, and match stats from top leagues worldwide. Track your favourite teams." />
    <meta name="author" content="LastFootball" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lastfootball.com" />
    <meta property="og:title" content="LastFootball — Live Scores &amp; Results" />
    <meta property="og:description" content="Real-time football live scores, fixtures, results, and match stats from top leagues worldwide." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LastFootball — Live Scores &amp; Results" />
    <meta name="twitter:description" content="Real-time football live scores, fixtures, results, and match stats from top leagues worldwide." />

    <!-- Preconnect for faster loads -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" /></noscript>

    <!-- Google Analytics (GA4) — loaded after paint -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C6ZXWQKDNR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C6ZXWQKDNR');
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Inline skeleton — shows instantly before React boots, improves FCP -->
      <div style="background:#141414;min-height:100vh;color:#eee;font-family:system-ui,sans-serif;">
        <div style="height:56px;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 16px;">
          <span style="font-size:18px;font-weight:800;">⚽ Last<span style="color:#4ade80;">Football</span></span>
        </div>
        <div style="max-width:640px;margin:0 auto;padding:16px;">
          <div style="display:flex;gap:8px;margin-bottom:16px;overflow:hidden;">
            <div style="background:#1e1e1e;border-radius:20px;padding:6px 16px;font-size:12px;color:#4ade80;">All</div>
            <div style="background:#1a1a1a;border-radius:20px;padding:6px 16px;width:80px;height:28px;"></div>
            <div style="background:#1a1a1a;border-radius:20px;padding:6px 16px;width:70px;height:28px;"></div>
          </div>
          <div style="background:#1a1a1a;border-radius:12px;padding:12px;margin-bottom:8px;">
            <div style="background:#222;height:12px;width:120px;border-radius:4px;margin-bottom:12px;"></div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              <div style="background:#222;width:18px;height:18px;border-radius:50%;"></div>
              <div style="background:#222;height:12px;width:140px;border-radius:4px;"></div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="background:#222;width:18px;height:18px;border-radius:50%;"></div>
              <div style="background:#222;height:12px;width:130px;border-radius:4px;"></div>
            </div>
          </div>
          <div style="background:#1a1a1a;border-radius:12px;padding:12px;margin-bottom:8px;">
            <div style="background:#222;height:12px;width:100px;border-radius:4px;margin-bottom:12px;"></div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              <div style="background:#222;width:18px;height:18px;border-radius:50%;"></div>
              <div style="background:#222;height:12px;width:150px;border-radius:4px;"></div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="background:#222;width:18px;height:18px;border-radius:50%;"></div>
              <div style="background:#222;height:12px;width:120px;border-radius:4px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
