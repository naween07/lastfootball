<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#darkGrad)" stroke="url(#ballGrad)" stroke-width="3"/>
  
  <!-- Football pentagon pattern (subtle) -->
  <path d="M60 20 L72 32 L68 48 L52 48 L48 32 Z" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.15"/>
  <path d="M80 44 L88 60 L80 76 L68 72 L68 48 Z" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.15"/>
  <path d="M40 44 L32 60 L40 76 L52 72 L52 48 Z" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.15"/>
  <path d="M52 72 L48 88 L60 96 L72 88 L68 72 Z" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.15"/>
  
  <!-- LF text -->
  <text x="60" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="42" fill="url(#ballGrad)" filter="url(#glow)" letter-spacing="-2">LF</text>
  
  <!-- Accent dot -->
  <circle cx="88" cy="30" r="4" fill="#4ade80" opacity="0.8"/>
</svg>
